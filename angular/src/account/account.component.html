<div class="d-flex flex-column flex-root">
    <div
        class="d-flex flex-column flex-column-fluid bgi-position-y-bottom position-x-center bgi-no-repeat bgi-size-contain bgi-attachment-fixed"
        style="background-image: url(/assets/metronic/assets/media/svg/illustrations/{{ backgroundImageName }}.png)">
        <div
            class="d-flex flex-center flex-column flex-column-fluid p-10"
            [class.pb-lg-20]="!isSelectEditionPage()"
            [class.pb-0]="isSelectEditionPage()">
            <!--begin::Logo-->
            <a
                (click)="goToHome()"
                href=""
                class="d-flex justify-content-center"
                [class.mb-12]="!isSelectEditionPage()">
                <img
                    *ngIf="!appSession.tenant || !appSession.tenant.HasLogo()"
                    [src]="defaultLogo"
                    alt="logo"
                    class="h-40px"
                    [class.mb-20]="isSelectEditionPage()" />
                <img
                    *ngIf="appSession.tenant && appSession.tenant.HasLogo()"
                    [src]="tenantLogoUrl"
                    alt="logo"
                    class="h-40px" />
            </a>
            <!--end::Logo-->

            <!--begin::Wrapper-->
            <div *ngIf="isSelectEditionPage(); else nonSelectEditionPage" class="container-xxl mx-auto">
                <div *ngIf="showTenantChange()" class="tenant-change-box mb-5">
                    <tenant-change></tenant-change>
                </div>
                <!--begin::Form-->
                <router-outlet></router-outlet>
                <!--end::Form-->
            </div>

            <ng-template #nonSelectEditionPage>
                <div *ngIf="isQrLoginEnabled(); else loginOnly">
                    <ng-container *ngTemplateOutlet="qrLoginWithRow"></ng-container>
                </div>
                <ng-template #loginOnly>
                    <div class="w-lg-500px bg-body rounded shadow-sm p-10 p-lg-15 mx-auto">
                        <div *ngIf="showTenantChange()" class="tenant-change-box mb-5">
                            <tenant-change></tenant-change>
                        </div>
                        <router-outlet></router-outlet>
                    </div>
                </ng-template>
            </ng-template>

            <ng-template #qrLoginWithRow>
                <div class="w-1000px bg-body rounded shadow-sm p-10 p-lg-15 mx-auto">
                    <div class="row">
                        <div class="col">
                            <div *ngIf="showTenantChange()" class="tenant-change-box mb-5">
                                <tenant-change></tenant-change>
                            </div>
                            <router-outlet></router-outlet>
                        </div>
                        <div class="col d-flex justify-content-center align-items-center">
                            <div class="card justify-content-center align-items-center p-2">
                                <div *ngIf="qrCodeUrl">
                                    <img [src]="qrCodeUrl" alt="qr code" width="250px" height="250px" class="mb-4" />
                                    <p class="text-center fs-4">Log in with QR Code</p>
                                </div>
                                <div *ngIf="!qrCodeUrl" class="root-initial-loader">
                                    <i class="fas fa-circle-notch fa-3x fa-spin-2x"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </ng-template>
            <!--end::Wrapper-->
        </div>
        <!--end::Content-->
        <!--begin::Footer-->
        <div class="d-flex flex-center flex-column-auto p-10" [class.pt-0]="isSelectEditionPage()">
            <!--begin::Links-->
            <div class="d-flex align-items-center fw-bold fs-6">
                <language-switch class="mx-auto"></language-switch>
            </div>
            <!--end::Links-->
        </div>
        <!--end::Footer-->
    </div>
    <!--end::Authentication - Sign-in-->
</div>
