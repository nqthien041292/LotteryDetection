name: Deploy backend to Cloud Run

# Deploys LotteryDetection.Web.Host to GCP Cloud Run using Workload Identity
# Federation (no service-account JSON key stored in GitHub).
#
# Pipeline:
#   1. Build + push BOTH images (web-host service, migrator job).
#   2. Create/update a Cloud Run Job for the migrator and execute it
#      against Cloud SQL. Wait for it to succeed.
#   3. Only then promote the Web.Host service to the new revision.
#
# ─── One-time GCP setup ──────────────────────────────────────────────────────
# Run `aspnet-core/scripts/setup-gcp.sh --project-id <PID> --github-repo
# <OWNER>/<REPO>` once. It enables APIs, creates the Artifact Registry repo,
# runtime + deployer service accounts, WIF pool/provider, and prints the
# GitHub secret/variable values to paste below.
#
# Additional one-off setup for the database:
#   gcloud sql instances create lottery-detection-db --database-version=POSTGRES_15 ...
#   gcloud sql databases create LotteryDetectionDb --instance=lottery-detection-db
#   gcloud sql users create lottery_app --instance=lottery-detection-db --password=...
#   gcloud projects add-iam-policy-binding <PID> \
#     --member=serviceAccount:lottery-runtime@... --role=roles/cloudsql.client
#   echo -n "Host=/cloudsql/<PID>:<REGION>:<INSTANCE>;Database=...;Username=...;Password=..." \
#     | gcloud secrets create db-connection-string --data-file=-
#   gcloud secrets add-iam-policy-binding db-connection-string \
#     --member=serviceAccount:lottery-runtime@... --role=roles/secretmanager.secretAccessor
#
# Deployer SA also needs roles/run.jobs.invoker (or run.admin already covers it).
#
# ─── GitHub repo configuration ───────────────────────────────────────────────
# Variables:  GCP_PROJECT_ID, GCP_LOCATION
# Secrets:    GCP_WIF_PROVIDER, GCP_DEPLOYER_SA, GCP_RUNTIME_SA, CLOUDSQL_INSTANCE

on:
  push:
    branches: [main]
    paths:
      - 'aspnet-core/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGION: asia-southeast1
  ARTIFACT_REPO: lottery-detection
  WEB_HOST_IMAGE: web-host
  MIGRATOR_IMAGE: migrator
  SERVICE_NAME: lottery-detection-api
  MIGRATOR_JOB: lottery-detection-migrator

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push images
        working-directory: aspnet-core
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          WEB_HOST_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${WEB_HOST_IMAGE}:${GITHUB_SHA}"
          MIGRATOR_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${MIGRATOR_IMAGE}:${GITHUB_SHA}"

          docker build -f src/LotteryDetection.Web.Host/Dockerfile.cloudrun -t "$WEB_HOST_URI" .
          docker build -f src/LotteryDetection.Migrator/Dockerfile.cloudrun -t "$MIGRATOR_URI" .

          docker push "$WEB_HOST_URI"
          docker push "$MIGRATOR_URI"

          echo "WEB_HOST_URI=$WEB_HOST_URI" >> "$GITHUB_ENV"
          echo "MIGRATOR_URI=$MIGRATOR_URI" >> "$GITHUB_ENV"

      - name: Create or update Migrator Cloud Run Job
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          # `jobs deploy` creates the job on first run and updates it on
          # subsequent runs — single command handles both paths.
          gcloud run jobs deploy "$MIGRATOR_JOB" \
            --image="$MIGRATOR_URI" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --service-account="${{ secrets.GCP_RUNTIME_SA }}" \
            --set-cloudsql-instances="${{ secrets.CLOUDSQL_INSTANCE }}" \
            --set-secrets="ConnectionStrings__Default=db-connection-string:latest" \
            --max-retries=1 \
            --task-timeout=600s \
            --memory=1Gi \
            --cpu=1

      - name: Execute Migrator job (apply migrations + seed)
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          # --wait blocks until the execution completes and exits non-zero on
          # failure, so a broken migration fails the workflow before we
          # promote the Web.Host revision.
          gcloud run jobs execute "$MIGRATOR_JOB" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --wait

      - name: Deploy Web.Host to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.WEB_HOST_URI }}
          # TODO: tighten to --no-allow-unauthenticated once mobile auth is wired
          flags: >-
            --allow-unauthenticated
            --memory=2Gi
            --cpu=1
            --min-instances=0
            --max-instances=4
            --timeout=300s
            --service-account=${{ secrets.GCP_RUNTIME_SA }}
            --add-cloudsql-instances=${{ secrets.CLOUDSQL_INSTANCE }}
          env_vars: |
            GoogleCloud__ProjectId=${{ vars.GCP_PROJECT_ID }}
            GoogleCloud__Location=${{ vars.GCP_LOCATION || 'asia-southeast1' }}
            ASPNETCORE_ENVIRONMENT=Production
            Authentication__Microsoft__IsEnabled=true
            Authentication__Google__IsEnabled=true
          # All provider secrets live in Google Secret Manager. The runtime SA
          # has roles/secretmanager.secretAccessor — see aspnet-core/scripts/
          # setup-external-auth.sh for the create-once instructions.
          secrets: |
            ConnectionStrings__Default=db-connection-string:latest
            Authentication__Microsoft__ConsumerKey=auth-microsoft-client-id:latest
            Authentication__Microsoft__ConsumerSecret=auth-microsoft-client-secret:latest
            Authentication__Google__ClientId=auth-google-client-id:latest
            Authentication__Google__ClientSecret=auth-google-client-secret:latest

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "$SERVICE_NAME" --region "$REGION" --format='value(status.url)')
          echo "Service deployed at: $URL"
          echo "::notice title=Cloud Run URL::$URL"
