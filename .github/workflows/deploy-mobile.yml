name: Deploy Mobile (Android)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/deploy-mobile.yml'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install MAUI Workloads
      run: dotnet workload install maui --ignore-failed-sources

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Restore Dependencies
      working-directory: mobile/LotteryDetection.Mobile
      run: dotnet restore LotteryDetection.Mobile.csproj

    - name: Build and Publish Android App (APK & AAB)
      working-directory: mobile/LotteryDetection.Mobile
      # We are building an unsigned APK/AAB for testing.
      # To sign it, you would need to add Keystore generation and specify Keystore properties.
      run: dotnet publish LotteryDetection.Mobile.csproj -f net9.0-android -c Release -p:AndroidPackageFormat=aab -p:AndroidCreatePackagePerAbi=false

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: LotteryDetection-Android-APK
        path: mobile/LotteryDetection.Mobile/bin/Release/net9.0-android/*-Signed.apk
        if-no-files-found: ignore

    - name: Upload Android AAB
      uses: actions/upload-artifact@v4
      with:
        name: LotteryDetection-Android-AAB
        path: mobile/LotteryDetection.Mobile/bin/Release/net9.0-android/*-Signed.aab
        if-no-files-found: ignore
